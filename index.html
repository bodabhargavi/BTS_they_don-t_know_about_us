<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS • They Don't Know 'Bout Us</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ================= Background ================= -->
    <div class="galaxy"></div>
    <div class="stars"></div>
    <canvas id="particleCanvas"></canvas>

    <!-- ================= Header ================= -->
    <header>
<div class="photo-card">
<img src="assets/photocard.jpg">
</div>
<div class="titles">
<h1>BTS</h1>
<h2>They Don't Know 'Bout Us</h2>
<p class="subtitle">Inspired by BTS 💜</p>
</div>
</header>
    <!-- ================= Lyrics Area ================= -->
    <main class="lyrics-area">
        <div class="word" id="ooh">
            OOH
        </div>
        <div class="middle-row">
            <div class="word" id="damn">
                DAMN
            </div>
            <div class="word" id="right">
                RIGHT
            </div>
        </div>
        <div class="word" id="yeah">
            YEAH
        </div>
        <!-- Arrow -->
        <div id="arrow">
            ➜
        </div>
    </main>

    <!-- ================= Progress ================= -->
    <section class="player">
        <div class="player-title">
            NOW PLAYING
        </div>
        <div class="progress-container">
            <div id="progress"></div>
        </div>
    </section>

    <!-- ================= BT21 ================= -->
    <footer>
        <div class="bt21">
            <img src="assets/tata.png" alt="Tata">
            <img src="assets/koya.png" alt="Koya">
            <img src="assets/rj.png" alt="RJ">
            <img src="assets/chimmy.png" alt="Chimmy">
            <img src="assets/shooky.png" alt="Shooky">
            <img src="assets/cooky.png" alt="Cooky">
            <img src="assets/mang.png" alt="Mang">
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
