<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS - They Don't Know 'Bout Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="photo-card">
            <img src="assets/photocard.png" alt="BTS Photocard">
        </div>
        <div class="info">
            <h1>BTS</h1>
            <h2>They Don't Know 'Bout Us</h2>
            <p>Inspired by BTS 💜</p>
        </div>
    </header>
    <!-- Lyrics -->
    <main class="lyrics">
        <div class="word" id="ooh">OOH</div>
        <div class="middle">
            <div class="word" id="damn">DAMN</div>
            <div class="word" id="right">RIGHT</div>
        </div>
        <div class="word" id="yeah">YEAH</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
